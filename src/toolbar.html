<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 520px;
      height: 68px;
      background: transparent;
      overflow: hidden;
      user-select: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      height: 56px;
      margin-top: 6px;
      background: rgba(20, 20, 30, 0.92);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      cursor: grab;
    }

    #toolbar:active { cursor: grabbing; }

    .group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    label {
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      white-space: nowrap;
    }

    .value {
      color: #fff;
      font-size: 11px;
      min-width: 26px;
      text-align: right;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 90px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.2);
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #508cff;
      cursor: pointer;
    }

    .divider {
      width: 1px;
      height: 32px;
      background: rgba(255,255,255,0.12);
      flex-shrink: 0;
    }

    .shape-btn {
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.18);
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .shape-btn.active {
      background: #508cff;
      color: #fff;
      border-color: #508cff;
    }

    .close-btn {
      margin-left: auto;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.45);
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .close-btn:hover {
      color: #fff;
      background: rgba(255,80,80,0.35);
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <div class="group">
      <label>Zoom</label>
      <input type="range" id="zoomSlider" min="15" max="100" step="5" value="30" />
      <span class="value" id="zoomVal">3x</span>
    </div>

    <div class="divider"></div>

    <div class="group">
      <label>Size</label>
      <input type="range" id="sizeSlider" min="100" max="400" step="10" value="200" />
      <span class="value" id="sizeVal">200</span>
    </div>

    <div class="divider"></div>

    <div class="group">
      <button class="shape-btn active" id="btnCircle">Circle</button>
      <button class="shape-btn" id="btnRect">Rect</button>
    </div>

    <button class="close-btn" id="btnClose" title="Close magnifier">✕</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    let config = { zoom: 3, lensSize: 200, shape: 'circle' };

    const zoomSlider = document.getElementById('zoomSlider');
    const sizeSlider = document.getElementById('sizeSlider');
    const zoomVal = document.getElementById('zoomVal');
    const sizeVal = document.getElementById('sizeVal');
    const btnCircle = document.getElementById('btnCircle');
    const btnRect = document.getElementById('btnRect');
    const btnClose = document.getElementById('btnClose');
    const toolbar = document.getElementById('toolbar');

    function applyConfig(cfg) {
      config = cfg;
      // slider stores zoom*10 to allow decimal steps
      zoomSlider.value = Math.round(cfg.zoom * 10);
      zoomVal.textContent = cfg.zoom.toFixed(1) + 'x';
      sizeSlider.value = cfg.lensSize;
      sizeVal.textContent = cfg.lensSize + 'px';
      btnCircle.classList.toggle('active', cfg.shape === 'circle');
      btnRect.classList.toggle('active', cfg.shape === 'rect');
    }

    function sendUpdate(updates) {
      config = { ...config, ...updates };
      applyConfig(config);
      ipcRenderer.send('config-update', config);
    }

    ipcRenderer.on('config', (_, cfg) => applyConfig(cfg));

    zoomSlider.addEventListener('input', () => {
      const zoom = zoomSlider.value / 10;
      zoomVal.textContent = zoom.toFixed(1) + 'x';
      sendUpdate({ zoom });
    });

    sizeSlider.addEventListener('input', () => {
      const lensSize = parseInt(sizeSlider.value);
      sizeVal.textContent = lensSize + 'px';
      sendUpdate({ lensSize });
    });

    btnCircle.addEventListener('click', () => sendUpdate({ shape: 'circle' }));
    btnRect.addEventListener('click', () => sendUpdate({ shape: 'rect' }));
    btnClose.addEventListener('click', () => ipcRenderer.send('close-magnifier'));

    // Handle scroll/key zoom events forwarded from overlay
    ipcRenderer.on('do-zoom', (_, delta) => {
      const newZoom = Math.min(10, Math.max(1.5, config.zoom + delta * 0.5));
      sendUpdate({ zoom: parseFloat(newZoom.toFixed(1)) });
    });

    // Draggable toolbar
    let dragging = false;
    let dragOffX = 0, dragOffY = 0;

    toolbar.addEventListener('mousedown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
      dragging = true;
      dragOffX = e.clientX;
      dragOffY = e.clientY;
    });

    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      ipcRenderer.send('toolbar-drag', { dx: e.clientX - dragOffX, dy: e.clientY - dragOffY });
      dragOffX = e.clientX;
      dragOffY = e.clientY;
    });

    document.addEventListener('mouseup', () => { dragging = false; });
  </script>
</body>
</html>
